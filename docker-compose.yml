# ============================================
# Docker Compose — Base Infrastructure
# ============================================
# This file defines shared infrastructure only.
# Use with an environment-specific override:
#
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Test: docker compose -f docker-compose.yml -f docker-compose.test.yml up
#
# Or use Makefile shortcuts: make dev / make prod / make test-all
# ============================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: rezerwacje-db
    environment:
      POSTGRES_USER: ${DB_USER:?Set DB_USER in .env file}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env file}
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME in .env file}
      POSTGRES_INITDB_ARGS: '--locale=en_US.UTF-8'
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rezerwacje-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rezerwacje-cache
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - rezerwacje-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rezerwacje-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
