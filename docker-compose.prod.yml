# ============================================
# Docker Compose — Production Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#    or: make prod
#
# Features:
#   - Multi-stage production builds (no source code in images)
#   - Automatic restart on failure
#   - No mounted volumes for code
#   - Uses .env.prod for environment variables
#
# Ports (prod): postgres=5432, redis=6379, minio=9000 (no console), api=3001, web=3000
# ============================================

services:
  postgres:
    restart: always
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    volumes:
      - ./apps/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    restart: always
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'

  minio:
    restart: always
    ports:
      - '127.0.0.1:${MINIO_PORT:-9000}:9000'
    volumes:
      - /data/minio:/data
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: prod
    container_name: rezerwacje-api
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST in .env.prod}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER in .env.prod}
      SMTP_PASS: ${SMTP_PASS:?Set SMTP_PASS in .env.prod}
      SMTP_FROM: ${SMTP_FROM:-noreply@gosciniecrodzinny.pl}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      RESTAURANT_NAME: ${RESTAURANT_NAME:-Gosciniec Rodzinny}
      RESTAURANT_ADDRESS: ${RESTAURANT_ADDRESS}
      RESTAURANT_PHONE: ${RESTAURANT_PHONE}
      RESTAURANT_EMAIL: ${RESTAURANT_EMAIL}
      RESTAURANT_WEBSITE: ${RESTAURANT_WEBSITE}
      RESTAURANT_NIP: ${RESTAURANT_NIP}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env.prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env.prod}
      MINIO_BUCKET_ATTACHMENTS: ${MINIO_BUCKET_ATTACHMENTS:-attachments}
      MINIO_BUCKET_PDFS: ${MINIO_BUCKET_PDFS:-pdfs}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-exports}
    ports:
      - '127.0.0.1:${API_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups
    networks:
      - rezerwacje-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env.prod}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Rezerwacje Gosciniec Rodzinny}
    container_name: rezerwacje-web
    env_file:
      - .env.prod
    ports:
      - '127.0.0.1:${WEB_PORT:-3000}:3000'
    depends_on:
      - backend
    networks:
      - rezerwacje-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  backend_uploads:
    driver: local
  backend_backups:
    driver: local
