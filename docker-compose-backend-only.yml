services:
  postgres:
    image: postgres:16-alpine
    container_name: rezerwacje-postgres
    environment:
      POSTGRES_DB: rezerwacje
      POSTGRES_USER: ${POSTGRES_USER:-rezerwacje}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rezerwacje123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rezerwacje"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rezerwacje-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: rezerwacje-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://rezerwacje:rezerwacje123@postgres:5432/rezerwacje
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-minimum-32-characters}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
