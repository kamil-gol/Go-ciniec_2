# ============================================
# Docker Compose — Development Override
# ============================================
# Usage: docker compose -p rezerwacje-dev -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d
#    or: make dev
#
# Features:
#   - Runs alongside prod (separate project, containers, ports)
#   - Source code mounted as volumes (hot-reload)
#   - Dev commands (npm run dev)
#   - Debug-friendly settings
#   - Uses .env.dev for environment variables
# ============================================

services:
  postgres:
    container_name: rezerwacje-db-dev
    ports:
      - '127.0.0.1:${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./apps/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    container_name: rezerwacje-cache-dev
    ports:
      - '127.0.0.1:${REDIS_PORT:-6380}:6379'
    volumes:
      - redis_data_dev:/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: dev
    container_name: rezerwacje-api-dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      LOG_LEVEL: debug
    ports:
      - '127.0.0.1:${API_PORT:-4001}:3001'
      - '127.0.0.1:9229:9229'  # Node.js debugger
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    networks:
      - rezerwacje-network
    command: npm run dev
    restart: 'no'

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: rezerwacje-web-dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Rezerwacje DEV}
    ports:
      - '127.0.0.1:${WEB_PORT:-4000}:3000'
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - rezerwacje-network
    command: npm run dev
    restart: 'no'

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
