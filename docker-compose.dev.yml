# ============================================
# Docker Compose — Development Override
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#    or: make dev
#
# Features:
#   - Source code mounted as volumes (hot-reload)
#   - Dev commands (npm run dev)
#   - Debug-friendly settings
#   - Uses .env.dev for environment variables
# ============================================

services:
  postgres:
    volumes:
      - ./apps/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: dev
    container_name: rezerwacje-api-dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      LOG_LEVEL: debug
    ports:
      - '${API_PORT:-3001}:3001'
      - '9229:9229'  # Node.js debugger
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    networks:
      - rezerwacje-network
    command: npm run dev
    restart: 'no'

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: rezerwacje-web-dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Rezerwacje Gosciniec Rodzinny}
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - rezerwacje-network
    command: npm run dev
    restart: 'no'
