name: Frontend Tests

on:
  push:
    branches: [main, develop, 'sprint-*']
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend-tests.yml'

jobs:
  # ========================================
  # Job 1: Lint + Type Check
  # ========================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Lint
        working-directory: ./apps/frontend
        run: npx next lint --max-warnings 0

      - name: Type Check
        working-directory: ./apps/frontend
        run: npx tsc --noEmit

  # ========================================
  # Job 2: Component Tests (Vitest + RTL)
  # ========================================
  component-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Run Component Tests
        working-directory: ./apps/frontend
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload Component Test Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/frontend/coverage/lcov.info
          flags: frontend-components
          fail_ci_if_error: false

  # ========================================
  # Job 3: Build Check
  # ========================================
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: ./apps/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_APP_NAME: Rezerwacje Test
