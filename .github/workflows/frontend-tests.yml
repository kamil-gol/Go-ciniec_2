name: Frontend Tests

on:
  push:
    branches: [main, develop, 'sprint-*']
    paths:
      - 'apps/frontend/**'
      - 'contracts/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/frontend/**'
      - 'contracts/**'
      - '.github/workflows/frontend-tests.yml'


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================
  # Job 1: Lint + Type Check
  # ========================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Lint
        working-directory: ./apps/frontend
        run: npm run lint

      - name: Type Check
        working-directory: ./apps/frontend
        run: npx tsc --noEmit

  # ========================================
  # Job 2: Component Tests (Vitest + RTL)
  # ========================================
  component-tests:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Run Component Tests
        working-directory: ./apps/frontend
        run: npx vitest run --reporter=verbose

  # ========================================
  # Job 3: Contract Tests (API response shape validation)
  # ========================================
  contract-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Run Contract Tests
        working-directory: ./apps/frontend
        run: npx vitest run --reporter=verbose __tests__/contracts/

  # ========================================
  # Job 4: Build Check
  # ========================================
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: ./apps/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_APP_NAME: Rezerwacje Test
