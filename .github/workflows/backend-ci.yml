name: Backend CI/CD

on:
  push:
    branches: [main, develop, 'sprint-*']
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/backend/**'

jobs:
  # ========================================
  # Job 1: Lint + Type Check
  # ========================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./apps/backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/rezerwacje_test

      - name: Lint
        working-directory: ./apps/backend
        run: npm run lint

      - name: Type Check
        working-directory: ./apps/backend
        run: npx tsc --noEmit

  # ========================================
  # Job 2: Unit Tests
  # ========================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./apps/backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/rezerwacje_test

      - name: Run Unit Tests
        working-directory: ./apps/backend
        run: npm run test:unit -- --coverage --ci --forceExit
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/rezerwacje_test

      - name: Upload Unit Test Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/backend/coverage/lcov.info
          flags: backend-unit
          fail_ci_if_error: false

  # ========================================
  # Job 3: Integration Tests (with PostgreSQL)
  # ========================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rezerwacje_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./apps/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./apps/backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/rezerwacje_test

      - name: Run Prisma Migrations
        working-directory: ./apps/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/rezerwacje_test

      - name: Run Integration Tests
        working-directory: ./apps/backend
        run: npm run test:integration -- --coverage --ci --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/rezerwacje_test
          JWT_SECRET: test-secret-key-do-not-use-in-production

      - name: Upload Integration Test Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/backend/coverage/lcov.info
          flags: backend-integration
          fail_ci_if_error: false

  # ========================================
  # Job 4: Docker Build (only on main push)
  # ========================================
  docker-build:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: false
          tags: kamil-gol/rezerwacje-backend:latest
