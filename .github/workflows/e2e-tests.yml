name: E2E Tests

on:
  push:
    branches: [ main, feature/reservation-queue ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # Smoke Tests — BLOCKING (must pass)
  # Only runs smoke.spec.ts on chromium
  # ========================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rezerwacje
          POSTGRES_PASSWORD: rezerwacje_password
          POSTGRES_DB: rezerwacje_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            apps/frontend/package-lock.json
            apps/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps chromium

      - name: Setup environment
        run: |
          touch apps/frontend/e2e/.env.test
          touch apps/backend/.env.test

      - name: Setup database schema
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://rezerwacje:rezerwacje_password@localhost:5432/rezerwacje_test
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss --force-reset

      - name: Seed test data
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://rezerwacje:rezerwacje_password@localhost:5432/rezerwacje_test
          NODE_ENV: development
        run: npm run db:seed

      - name: Start servers
        env:
          DATABASE_URL: postgresql://rezerwacje:rezerwacje_password@localhost:5432/rezerwacje_test
          JWT_SECRET: test_jwt_secret_key_for_ci
          NODE_ENV: development
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: |
          cd apps/backend && npx tsx src/index.ts &
          npx wait-on http://localhost:3001/api/health --timeout 60000
          cd apps/frontend && npm run build && npm start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run smoke tests
        working-directory: apps/frontend
        env:
          CI: true
        run: |
          npx playwright test smoke.spec.ts --project=chromium --retries=1 --reporter=list

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: apps/frontend/playwright-report/
          retention-days: 7

  # ========================================
  # Full E2E Tests — NON-BLOCKING (informational)
  # Runs all tests on chromium only, with continue-on-error
  # ========================================
  e2e-full:
    name: Full E2E Tests (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    needs: smoke-tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rezerwacje
          POSTGRES_PASSWORD: rezerwacje_password
          POSTGRES_DB: rezerwacje_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            apps/frontend/package-lock.json
            apps/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: |
          npm ci --legacy-peer-deps
          npx playwright install --with-deps chromium

      - name: Setup environment variables
        run: |
          touch apps/frontend/e2e/.env.test
          touch apps/backend/.env.test

      - name: Setup database schema
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://rezerwacje:rezerwacje_password@localhost:5432/rezerwacje_test
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss --force-reset

      - name: Seed test data
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://rezerwacje:rezerwacje_password@localhost:5432/rezerwacje_test
          NODE_ENV: development
        run: npm run db:seed

      - name: Start backend server
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://rezerwacje:rezerwacje_password@localhost:5432/rezerwacje_test
          JWT_SECRET: test_jwt_secret_key_for_ci
          NODE_ENV: development
        run: |
          npx tsx src/index.ts &
          npx wait-on http://localhost:3001/api/health --timeout 60000

      - name: Start frontend server
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: |
          npm run build
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run all E2E tests
        working-directory: apps/frontend
        env:
          CI: true
        run: |
          npx playwright test --project=chromium --retries=0 --reporter=html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: apps/frontend/playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: apps/frontend/test-results/
          retention-days: 7
